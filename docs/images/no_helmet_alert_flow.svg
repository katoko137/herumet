<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">未装着連続フレーム通知の流れ</title>
  <desc id="desc">ヘルメット装着判定の結果に応じて連続カウントを増減し、指定フレーム数に到達したらターミナルに通知する流れ</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #f7f8fa; }
      .node { fill: #ffffff; stroke: #9aa4b2; stroke-width: 2.5; }
      .decision { fill: #fff8e6; stroke: #d99a00; stroke-width: 2.5; }
      .warn { fill: #fff0f0; stroke: #d33f49; stroke-width: 2.5; }
      .ok { fill: #eef9f1; stroke: #28a745; stroke-width: 2.5; }
      .line { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font-family: "Yu Gothic", "Meiryo", sans-serif; font-size: 18px; fill: #111827; }
      .small { font-family: "Yu Gothic", "Meiryo", sans-serif; font-size: 15px; fill: #374151; }
      .title { font-family: "Yu Gothic", "Meiryo", sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
    </style>
  </defs>

  <rect class="bg" width="920" height="420"/>
  <text class="title" x="40" y="42">--alert-frames の通知ロジック</text>

  <rect class="node" x="40" y="90" width="160" height="78" rx="8"/>
  <text class="label" x="72" y="123">人物ごとに</text>
  <text class="label" x="62" y="148">装着判定</text>

  <path class="line" d="M 200 129 H 260"/>

  <polygon class="decision" points="330,80 420,129 330,178 240,129"/>
  <text class="label" x="281" y="124">装着</text>
  <text class="label" x="281" y="149">している?</text>

  <path class="line" d="M 420 129 H 500"/>
  <text class="small" x="438" y="114">いいえ</text>

  <rect class="warn" x="500" y="90" width="180" height="78" rx="8"/>
  <text class="label" x="526" y="123">未装着カウント</text>
  <text class="label" x="552" y="148">+1</text>

  <path class="line" d="M 680 129 H 740"/>

  <polygon class="decision" points="805,80 880,129 805,178 730,129"/>
  <text class="label" x="765" y="124">指定数</text>
  <text class="label" x="758" y="149">到達?</text>

  <path class="line" d="M 805 178 V 250"/>
  <text class="small" x="815" y="220">はい</text>

  <rect class="warn" x="700" y="250" width="210" height="86" rx="8"/>
  <text class="label" x="724" y="285">ターミナルに</text>
  <text class="label" x="730" y="311">1回だけ警告</text>

  <path class="line" d="M 330 178 V 250 H 240"/>
  <text class="small" x="345" y="220">はい</text>

  <rect class="ok" x="40" y="250" width="200" height="86" rx="8"/>
  <text class="label" x="65" y="285">カウントと通知済み</text>
  <text class="label" x="100" y="311">状態をリセット</text>

  <rect class="node" x="300" y="250" width="260" height="86" rx="8"/>
  <text class="label" x="324" y="285">人物が画面外に消えた時も</text>
  <text class="label" x="358" y="311">状態をリセット</text>
</svg>
